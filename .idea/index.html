<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zen Todo Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">ZenJS</div>

    <div id="theme-toggle">🌙</div>

    <div class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
    </div>

    <ul class="nav-links" id="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Tasks</a></li>
    </ul>
</nav>

<!-- MAIN -->
<main class="container">

    <h1 id="greeting">Hello</h1>
    <p>Rules : double click for edit your task. Touch it one time for success, and X for delete.</p>

    <input type="text" id="taskInput" placeholder="Add a task">
    <button id="addBtn">Add</button>

    <p id="taskCounter">0 tasks</p>

    <ul id="taskList"></ul>

    <button id="magic-btn">Click me</button>

</main>

<script src="js/script.js"></script>

</body>
</html>
